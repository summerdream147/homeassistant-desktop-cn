<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <title>Home Assistant</title>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,user-scalable=no"/>
  <link href="assets/style.css" rel="stylesheet"/>
  <link href="assets/error.css" rel="stylesheet"/>
  <script>
    const { ipcRenderer } = require('electron');

    const i18n = {
      zh: {
        message: '无法连接到 Home Assistant 实例，请检查您的网络连接。',
        reconnect: '重新连接',
        restart: '重启应用'
      },
      en: {
        message: 'Home Assistant instance is not available, please check your connection.',
        reconnect: 'Reconnect',
        restart: 'Restart'
      }
    };

    function updateLanguage(lang) {
      const t = i18n[lang];
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      document.querySelector('.error').textContent = t.message;
      document.querySelector('button[onclick="reconnect()"]').textContent = t.reconnect;
      document.querySelector('button[onclick="restart()"]').textContent = t.restart;
    }

    ipcRenderer.send('get-language');
    ipcRenderer.on('get-language', (event, lang) => {
      updateLanguage(lang);
    });

    function reconnect() {
      ipcRenderer.send('reconnect');
    }

    function restart() {
      ipcRenderer.send('restart');
    }
  </script>
</head>

<body>
<div class="vertical-center">
  <div class="content">
    <div class="center">
      <svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130.2 130.2">
        <circle class="path circle" fill="none" stroke="#D06079" stroke-width="6" stroke-miterlimit="10" cx="65.1" cy="65.1" r="62.1"/>
        <line class="path line" fill="none" stroke="#D06079" stroke-width="6" stroke-linecap="round" stroke-miterlimit="10" x1="34.4"
              y1="37.9" x2="95.8" y2="92.3"/>
        <line class="path line" fill="none" stroke="#D06079" stroke-width="6" stroke-linecap="round" stroke-miterlimit="10" x1="95.8"
              y1="38" x2="34.4" y2="92.2"/>
      </svg>
    </div>
    <div class="center">
      <p class="error">
        无法连接到 Home Assistant 实例，请检查您的网络连接。
      </p>
    </div>
    <div class="center">
      <button class="pure-material-button-contained" onclick="reconnect()">重新连接</button>
      <button class="pure-material-button-contained" onclick="restart()" style="margin-left: 10px">重启应用</button>
    </div>
  </div>
</div>
</body>
</html>
